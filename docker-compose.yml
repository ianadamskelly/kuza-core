services:
  api:
    image: golang:1.26
    working_dir: /workspace
    command: go run ./cmd/kuzacore
    ports:
      - "8080:8080"
    environment:
      KUZA_CORE_ENV: development
      KUZA_CORE_ADDR: :8080
      KUZA_CORE_DATABASE_URL: postgres://kuza:kuza@postgres:5432/kuza_core?sslmode=disable
      KUZA_CORE_PUBLIC_URL: http://localhost:8080
      KUZA_CORE_STORAGE_ENDPOINT: http://garage:3900
      KUZA_CORE_STORAGE_BUCKET: kuza-core
      KUZA_CORE_STORAGE_ACCESS_KEY: GKkuza
      KUZA_CORE_STORAGE_SECRET_KEY: kuza-secret
      KUZA_CORE_SESSION_TTL_HOURS: 24
      KUZA_CORE_BOOTSTRAP_PROJECT_NAME: Kuza Core Demo
      KUZA_CORE_BOOTSTRAP_PROJECT_SLUG: kuza-core-demo
      KUZA_CORE_BOOTSTRAP_OWNER_EMAIL: owner@example.com
      KUZA_CORE_BOOTSTRAP_OWNER_PASSWORD: change-me-before-production
    volumes:
      - .:/workspace
    depends_on:
      - postgres
      - garage

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kuza_core
      POSTGRES_USER: kuza
      POSTGRES_PASSWORD: kuza
    volumes:
      - postgres-data:/var/lib/postgresql/data

  garage:
    image: dxflrs/garage:v2.3.0
    command: /garage server --single-node --default-bucket
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: GKkuza
      GARAGE_DEFAULT_SECRET_KEY: kuza-secret
      GARAGE_DEFAULT_BUCKET: kuza-core
    volumes:
      - ./infra/garage/garage.toml:/etc/garage.toml
      - garage-data:/var/lib/garage

volumes:
  postgres-data:
  garage-data:
